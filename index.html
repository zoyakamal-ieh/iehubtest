<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iHub Smart Router</title>
    <script type="text/javascript">
        function smartRedirect() {
            var desktopURL = "https://sites.google.com/fosis.org.uk/iehubtestdesktop/home";
            var mobileURL = "https://sites.google.com/fosis.org.uk/iehubmobile/home";

            // We use 900px to ensure tablets also get the mobile experience if preferred
            var width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;

            if (width <= 900) {
                window.location.replace(mobileURL);
            } else {
                window.location.replace(desktopURL);
            }
        }
        // Run immediately
        smartRedirect();
    </script>
</head>
<body style="background: white; text-align: center; font-family: sans-serif; padding-top: 30vh;">
    <div style="color: #0b0f19;">Loading your iHub experience...</div>
    <!-- Manual Fallback -->
    <noscript>
        <a href="https://sites.google.com/fosis.org.uk/iehubmobile/home">Click here for Mobile</a>
    </noscript>
</body>
</html>
